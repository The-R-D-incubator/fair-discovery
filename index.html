<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fair Discovery | Industry Utility Hub</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
    body { font-family: 'Geist', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
    .grid-bg { background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 30px 30px; }
    
    .theme-accent { color: #bef264; }
    .bg-theme-accent { background-color: #bef264; }
    
    .neon-card { 
        position: relative;
        background: rgba(10, 10, 10, 0.95);
        border: 1px solid rgba(255,255,255,0.05); 
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    
    /* Image Header for Cards */
    .card-img-header {
        height: 200px;
        background-size: cover;
        background-position: center;
        position: relative;
        border-bottom: 1px solid rgba(190, 242, 100, 0.1);
    }
    .card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent, rgba(10,10,10,1));
    }

    .neon-card:hover { 
        border-color: #bef264; 
        box-shadow: 0 0 40px rgba(190, 242, 100, 0.05);
        transform: translateY(-5px);
    }

    .free-tag { color: #39ff14; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }

    .reveal-anim { animation: fadeInUp 0.8s ease forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #bef264; }
  </style>

  </head>
<body class="grid-bg min-h-screen">

  <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center sticky top-0 z-50 bg-black/90 backdrop-blur-3xl border-b border-white/5">
    <div class="flex items-center gap-4">
      <img src="logo.png" alt="Logo" class="h-6 w-auto">
      <span class="font-bold tracking-tighter text-sm uppercase italic">Fair Discovery</span>
    </div>
    <div class="flex gap-8 items-center">
        <a href="mailto:jarrit@forgevertical.com" class="text-[10px] font-bold uppercase tracking-[0.3em] theme-accent hover:text-white transition">Support</a>
        <a href="https://forgevertical.com" target="_blank" class="hidden md:block text-[10px] font-bold uppercase tracking-[0.3em] text-zinc-600 hover:text-white transition">Forge Vertical</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 pt-24 pb-32">
    <div class="max-w-4xl mb-20 reveal-anim">
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter leading-[0.85] mb-10 uppercase italic">
            Fair Discovery<br><span class="theme-accent text-5xl md:text-7xl">Tools Forged for your Industry.</span>
        </h1>
        <p class="text-zinc-300 text-2xl font-light leading-relaxed max-w-3xl">
            Sovereign logic and industrial-grade tools for the next generation of creators.
        </p>
    </div>

    <div class="mb-16 flex flex-col md:flex-row gap-6 items-center justify-between sticky top-[95px] z-40 bg-black/60 py-6 backdrop-blur-xl border-y border-white/5 px-4 rounded-3xl">
        <div class="relative w-full md:w-96">
            <input type="text" id="toolSearch" onkeyup="filterTools()" placeholder="Search Repository..." 
                   class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-theme-accent transition text-zinc-300">
        </div>
        <div class="flex flex-wrap gap-2 justify-center">
            <button onclick="setCategory('All')" class="cat-btn px-6 py-2 rounded-xl border border-theme-accent text-theme-accent text-[10px] font-bold uppercase tracking-widest transition bg-white/5">All</button>
            <button onclick="setCategory('Security')" class="cat-btn px-6 py-2 rounded-xl border border-white/10 text-[10px] font-bold uppercase tracking-widest hover:border-theme-accent transition">Security</button>
            <button onclick="setCategory('Free Zone')" class="cat-btn px-6 py-2 rounded-xl border border-white/10 text-[10px] font-bold uppercase tracking-widest hover:border-theme-accent transition">Free Zone</button>
            <button onclick="setCategory('AI')" class="cat-btn px-6 py-2 rounded-xl border border-white/10 text-[10px] font-bold uppercase tracking-widest hover:border-theme-accent transition">AI</button>
            <button onclick="setCategory('Business')" class="cat-btn px-6 py-2 rounded-xl border border-white/10 text-[10px] font-bold uppercase tracking-widest hover:border-theme-accent transition">Business</button>
        </div>
    </div>

    <div id="store-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </main>

  <script>
    let allProducts = [];
    let currentCategory = 'All';

    async function loadStore() {
        try {
            const response = await fetch('products.json');
            const data = await response.json();
            
            // Sort by popularity (Highest first) as requested
            allProducts = data.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
            
            renderStore(allProducts);
        } catch (e) { console.error("Repository load failed", e); }
    }

    function renderStore(products) {
        const grid = document.getElementById('store-grid');
        grid.innerHTML = products.map((tool, index) => {
            const isFree = tool.price.toUpperCase() === 'FREE';
            const priceDisplay = isFree ? `<span class="free-tag font-mono text-3xl font-bold italic tracking-tighter">FREE</span>` : 
                                          `<span class="theme-accent font-mono text-3xl font-bold tracking-tighter">$${tool.price}</span>`;
            
            return `
            <div class="neon-card rounded-[2.5rem] reveal-anim" style="animation-delay: ${index * 0.05}s">
                <div class="card-img-header" style="background-image: url('img/${tool.image}')">
                    <div class="card-overlay"></div>
                </div>

                <div class="p-10 pt-0 flex flex-col flex-grow">
                    <div class="flex justify-between items-start mb-8">
                        <img src="${tool.logo}" class="h-8 w-8 object-contain opacity-40" alt="Logo">
                        ${priceDisplay}
                    </div>
                    
                    <h3 class="text-3xl font-black tracking-tighter mb-4 italic uppercase leading-none">${tool.name}</h3>
                    <p class="text-zinc-400 text-base leading-relaxed mb-8 font-light">${tool.description}</p>
                    
                    <div class="flex flex-wrap gap-2 mb-10 mt-auto">
                        ${tool.tags.map(tag => `<span class="px-3 py-1 bg-white/5 text-zinc-600 text-[8px] font-bold uppercase rounded-md tracking-widest">${tag}</span>`).join('')}
                    </div>

                    <a href="${tool.paypal_url}" target="_blank" class="block text-center border border-theme-accent text-theme-accent py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.3em] hover:bg-theme-accent hover:text-black transition-all duration-500">
                        ${isFree ? 'Initialize Download' : 'Acquire Node'}
                    </a>
                </div>
            </div>
        `}).join('');
    }

    function filterTools() {
        const query = document.getElementById('toolSearch').value.toLowerCase();
        const filtered = allProducts.filter(p => {
            const matchesSearch = p.name.toLowerCase().includes(query) || p.description.toLowerCase().includes(query) || p.tags.some(t => t.toLowerCase().includes(query));
            const matchesCat = currentCategory === 'All' || p.category === currentCategory;
            return matchesSearch && matchesCat;
        });
        renderStore(filtered);
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            const isMatch = btn.innerText === cat.toUpperCase();
            btn.classList.toggle('border-theme-accent', isMatch);
            btn.classList.toggle('text-theme-accent', isMatch);
            btn.classList.toggle('bg-white/5', isMatch);
            btn.classList.toggle('border-white/10', !isMatch);
            btn.classList.toggle('text-zinc-500', !isMatch);
        });
        filterTools();
    }

    window.onload = loadStore;
  </script>
</body>
</html>
