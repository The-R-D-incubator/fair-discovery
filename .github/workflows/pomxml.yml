name: Factory Maintenance Strike
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 1 */3 *' # Runs at midnight on the 1st of every 3rd month

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Factory and Generate Sitemap
        run: python factory.py

      - name: Commit and Push Changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add affiliates/ sitemap.xml
          git commit -m "Auto-refresh: 1,000 pages updated with 2026 timestamps" || echo "No changes to commit"
          git push
