name: MASTER_MAINTENANCE_COMMAND
on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_DEPLOY_TOKEN }}
          fetch-depth: 0 

      # NEW: This builds the engine so the scripts can actually run
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Industrial Dependencies
        run: |
          pip install requests feedparser firebase-admin

      - name: 1. Repair & Optimize Files
        run: python .github/scripts/maintenance_sync.py
        
      - name: 2. Forge New Intel (NP-Quality)
        run: python .github/scripts/bot_army_brain.py
        
      - name: 3. Sync Segmented Sitemaps
        run: python .github/scripts/update_sitemap.py
        
      - name: 4. Push Updates
        run: |
          git config user.name "Fair-Discovery-Bot"
          git config user.email "bot@fairdiscovery.org"
          git add .
          git pull origin main --rebase || echo "No remote changes"
          git commit -m "integrity: industrial node sync [v1.2]" || echo "Stable"
          git push origin main
