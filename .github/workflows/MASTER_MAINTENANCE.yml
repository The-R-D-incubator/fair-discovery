name: MASTER_MAINTENANCE_COMMAND
on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Handing the Master Key to the Bot
          token: ${{ secrets.BOT_DEPLOY_TOKEN }}
          fetch-depth: 0 # Essential for rebase logic

      - name: 1. Repair & Optimize Files
        run: python .github/scripts/maintenance_sync.py
        
      - name: 2. Forge New Intel (NP-Quality)
        run: python .github/scripts/bot_army_brain.py
        
      - name: 3. Sync Segmented Sitemaps
        run: python .github/scripts/update_sitemap.py
        
      - name: 4. Push Updates
        run: |
          git config user.name "Fair-Discovery-Bot"
          git config user.email "bot@fairdiscovery.org"
          # Adding everything to ensure the King Kong sitemaps land
          git add docs/*.xml docs/intel/*.html docs/*.html .github/scripts/*.py
          git pull origin main --rebase || echo "No remote changes to sync"
          git commit -m "integrity: king kong sitemap index & forensic node deployment" || echo "Stable"
          git push origin main
