name: FORGE_MULTI_BOT_ARMY
on:
  schedule:
    - cron: '0 12 * * *' # Every day at Noon
  workflow_dispatch:

jobs:
  generate-intel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Handing the Master Key to the Daily Bot Army
          token: ${{ secrets.BOT_DEPLOY_TOKEN }}
          fetch-depth: 0 
      
      - name: Run Bot Army Brain
        run: python .github/scripts/bot_army_brain.py
        
      - name: Update Sitemap
        run: python .github/scripts/update_sitemap.py
        
      - name: 4. Push Updates
        run: |
          git config user.name "Fair-Discovery-Bot"
          git config user.email "bot@fairdiscovery.org"
          git add .
          # Sync with any other bots that finished in the last few seconds
          git pull origin main --rebase || echo "No remote changes"
          git commit -m "integrity: industrial node sync [v1.2]" || echo "Stable"
          git push origin main
