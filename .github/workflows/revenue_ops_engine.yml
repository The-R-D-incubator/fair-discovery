name: REVENUE_OPS_ENGINE

on:
  workflow_dispatch:
    inputs:
      batch_start:
        description: 'Index'
        required: true
        default: '0'

jobs:
  revenue-operations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_DEPLOY_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Factory
        env:
          BATCH_START: ${{ github.event.inputs.batch_start }}
        run: python factory.py

      - name: Sync
        run: |
          git config --local user.email "ops@fairdiscovery.org"
          git config --local user.name "Forge-Bot-Army"
          git add .
          git commit -m "Strike at ${{ github.event.inputs.batch_start }}" || exit 0
          git push origin main
