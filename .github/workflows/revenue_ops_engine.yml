name: REVENUE_OPS_ENGINE

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  revenue-operations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Build Global Affiliate Portals
        run: python factory.py

      - name: Commit and Sync Affiliate Network
        run: |
          git config --local user.email "ops@fairdiscovery.org"
          git config --local user.name "Forge-Bot-Army"
          git add affiliates/*
          git commit -m "Global Network Sync" || exit 0
          git push origin main
