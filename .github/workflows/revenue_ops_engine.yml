name: REVENUE_OPS_ENGINE
on:
  workflow_dispatch:
    inputs:
      batch_start:
        description: 'Site index to start from (0, 20, 40, 60, 80)'
        required: true
        default: '0'

jobs:
  revenue-operations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Build
        env:
          BATCH_START: ${{ github.event.inputs.batch_start }}
        run: python factory.py

      - name: Sync
        run: |
          git config --local user.email "ops@fairdiscovery.org"
          git config --local user.name "Forge-Bot-Army"
          git add affiliates/
          git commit -m "Batch Strike: ${{ github.event.inputs.batch_start }}" || exit 0
          git push origin main
