name: Holiday Promotion Governor
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  update-promos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Check Calendar & Update JSON
        run: |
          # The bot executes the brain script we created in .github/scripts/
          python3 .github/scripts/check_holidays.py

      - name: Commit Changes
        run: |
          # Standard Git Identity for the Bot
          git config user.name "Fair-Discovery-Bot"
          git config user.email "bot@fairdiscovery.org"
          
          # Stage the updated promo file
          git add global_promo.json
          
          # Commit and push back to main
          git commit -m "bot: global holiday sync [automated]" || echo "No changes detected today"
          git push
