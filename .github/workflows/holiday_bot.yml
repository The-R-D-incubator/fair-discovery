name: Holiday Promotion Governor
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: 

jobs:
  update-promos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Handing the Master Key to the Holiday Bot
          token: ${{ secrets.BOT_DEPLOY_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Check Calendar & Update JSON
        run: python3 .github/scripts/check_holidays.py

      - name: Commit Changes
        run: |
          git config user.name "Fair-Discovery-Bot"
          git config user.email "bot@fairdiscovery.org"
          
          # Stage the updated promo file and any sitemap changes
          git add global_promo.json docs/*.xml
          
          git commit -m "bot: global holiday sync [automated]" || echo "No changes detected today"
          git push origin main
