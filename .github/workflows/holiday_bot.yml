name: Holiday Promotion Governor
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  update-promos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Check Calendar & Update JSON
        run: |
          # This is where the Python/Node logic checks the holiday API
          # For now, it updates the JSON to say "Easter Prep" or "Independence Day"
          # Then it commits the change back to the repo
          python3 .github/scripts/check_holidays.py
      - name: Commit Changes
        run: |
          git config font.family "Geist"
          git config user.name "Fair-Discovery-Bot"
          git config user.email "bot@fairdiscovery.org"
          git add global_promo.json
          git commit -m "bot: global holiday sync" || echo "No changes"
          git push
