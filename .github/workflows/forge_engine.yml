name: FORGE_REVENUE_ENGINE
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour on the dot
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  run-bots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Trend Jacker
        run: python bot/trend_jacker.py
      - name: Run Signal Scout
        run: python bot/scout.py
      - name: Commit Updated Leads
        run: |
          git config --local user.email "bot@fairdiscovery.org"
          git config --local user.name "Forge-Bot-Army"
          git add bot/leads/daily_hitlist.csv
          git commit -m "Automated Lead Sweep [$(date)]" || exit 0
          git push
